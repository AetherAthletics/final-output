<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact — Rove & Thread</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>

<body>

<header>
  <div class="container brand">
    <div class="logo">R</div>
    <div>
      <div class="brand-title">Rove & Thread</div>
      <div class="brand-sub">vintage — web proj</div>
    </div>
  </div>

  <nav class="container">
    <a href="index.html">Home</a>
    <a href="collections.html">Collections</a>
    <a href="contact.html" class="active">Contact</a>
  </nav>
</header>

<main class="container">
  <h1 class="section-title">Contact Us</h1>
  <p class="p-muted">Have questions? Send us a message.</p>

  <form class="contact-form">
    <div class="mb-3">
      <label>Name</label>
      <input type="text" class="form-control">
    </div>

    <div class="mb-3">
      <label>Email</label>
      <input type="email" class="form-control">
    </div>

    <div class="mb-3">
      <label>Message</label>
      <textarea class="form-control" rows="4"></textarea>
    </div>

    <button class="cta">Send Message</button>
  </form>
</main>

<footer>
  © Rove & Thread — Vintage Clothing Brand
</footer>

</body>
</html>
